name: CI

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  setup:
    name: Setup & Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/build.gradle.kts', '**/libs.versions.toml', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download dependencies
        run: ./gradlew dependencies || gradle dependencies

      - name: Upload repository
        uses: actions/upload-artifact@v4
        with:
          name: repository
          path: .
          retention-days: 1

  code-style:
    name: Code Style Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download repository
        uses: actions/download-artifact@v4
        with:
          name: repository
          path: .

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/build.gradle.kts', '**/libs.versions.toml', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Check code formatting
        run: ./gradlew spotlessCheck || gradle spotlessCheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download repository
        uses: actions/download-artifact@v4
        with:
          name: repository
          path: .

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/build.gradle.kts', '**/libs.versions.toml', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build all modules
        run: ./gradlew build -x test || gradle build -x test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            gclens-bom/build/
            gclens-model/build/
            gclens-parse/build/
            gclens-insights/build/
            models/gclens-g1gc/build/
            gclens-engine/build/
            gclens-cli/build/
          retention-days: 1

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download repository
        uses: actions/download-artifact@v4
        with:
          name: repository
          path: .

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/build.gradle.kts', '**/libs.versions.toml', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test || gradle test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            gclens-model/build/reports/tests/test/
            gclens-parse/build/reports/tests/test/
            gclens-insights/build/reports/tests/test/
            models/gclens-g1gc/build/reports/tests/test/
            gclens-engine/build/reports/tests/test/
            gclens-cli/build/reports/tests/test/
          if-no-files-found: warn
          retention-days: 7
